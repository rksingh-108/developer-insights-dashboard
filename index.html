<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Developer Insights Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    --secondary-gradient: linear-gradient(120deg, #84fab0 0%, #8fd3f4 100%);
    --accent-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    --dark-bg: #0a0e27;
    --light-text: #ffffff;
    --muted-text: #a8b5d1;
}

html{
    scroll-behavior: smooth;
}

body{
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 25%, #16213e 50%, #0f3460 75%, #0a0e27 100%);
    background-attachment: fixed;
    color: var(--light-text);
    min-height: 100vh;
    padding: 60px 20px;
    position: relative;
    overflow-x: hidden;
}

body::before{
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(240, 147, 251, 0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
}

.container{
    max-width: 1400px;
    margin: auto;
    position: relative;
    z-index: 1;
}

.premium-card{
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 40px;
    margin-bottom: 40px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
    transition: all 0.5s cubic-bezier(0.23, 1, 0.320, 1);
    position: relative;
    overflow: hidden;
}

.premium-card::before{
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
    transition: left 0.5s ease;
}

.premium-card:hover{
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow: 0 20px 60px rgba(102, 126, 234, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
    transform: translateY(-4px);
}

.premium-card:hover::before{
    left: 100%;
}

.header-section{
    text-align: center;
    margin-bottom: 20px;
}

.header-section h1{
    font-size: 4.5rem;
    font-weight: 800;
    margin-bottom: 16px;
    letter-spacing: -2px;
    background: var(--primary-gradient);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 200% 200%;
    animation: gradientShift 8s ease infinite;
    line-height: 1.1;
}

@keyframes gradientShift{
    0%, 100%{
        background-position: 0% 50%;
    }
    50%{
        background-position: 100% 50%;
    }
}

.header-section p{
    color: var(--muted-text);
    font-size: 1.15rem;
    font-weight: 300;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
}

.header-badge{
    display: inline-block;
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(240, 147, 251, 0.2) 100%);
    border: 1px solid rgba(102, 126, 234, 0.3);
    color: #a8d4ff;
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-top: 16px;
}

.search-wrapper{
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
}

.search-input-group{
    flex: 1;
    min-width: 200px;
    position: relative;
}

.search-input-group input,
.search-input-group select{
    width: 100%;
    background: rgba(20, 25, 50, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(102, 126, 234, 0.2);
    color: var(--light-text);
    padding: 16px 20px;
    border-radius: 14px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
    letter-spacing: 0.3px;
}

.search-input-group input::placeholder{
    color: rgba(168, 181, 209, 0.5);
}

.search-input-group input:focus,
.search-input-group select:focus{
    outline: none;
    background: rgba(20, 25, 50, 0.8);
    border-color: rgba(102, 126, 234, 0.6);
    box-shadow: 0 0 20px rgba(102, 126, 234, 0.2),
                inset 0 0 10px rgba(102, 126, 234, 0.1);
    transform: translateY(-2px);
}

.btn-analyze{
    padding: 16px 40px;
    border: none;
    border-radius: 14px;
    background: var(--primary-gradient);
    color: white;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
    font-size: 15px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3),
                0 0 20px rgba(240, 147, 251, 0.1);
    position: relative;
    overflow: hidden;
}

.btn-analyze::before{
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s ease;
}

.btn-analyze:hover{
    transform: translateY(-4px);
    box-shadow: 0 20px 50px rgba(102, 126, 234, 0.4),
                0 0 30px rgba(240, 147, 251, 0.2);
}

.btn-analyze:hover::before{
    left: 100%;
}

.btn-analyze:active{
    transform: translateY(-1px);
}

.loading-container{
    display: none;
    text-align: center;
    margin-bottom: 32px;
    animation: fadeIn 0.4s ease;
}

.loading-container.show{
    display: block;
}

.loading-text{
    font-size: 16px;
    color: var(--muted-text);
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
}

.loading-spinner{
    width: 50px;
    height: 50px;
    margin: 0 auto;
    border: 3px solid rgba(102, 126, 234, 0.2);
    border-top: 3px solid #667eea;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform: rotate(0deg); }
    100%{ transform: rotate(360deg); }
}

.error-alert{
    display: none;
    background: linear-gradient(135deg, rgba(255, 70, 100, 0.15) 0%, rgba(255, 100, 130, 0.1) 100%);
    border: 1px solid rgba(255, 107, 130, 0.3);
    border-radius: 14px;
    padding: 18px 24px;
    margin-bottom: 32px;
    color: #ffb3c1;
    font-weight: 500;
    letter-spacing: 0.3px;
    animation: slideInDown 0.4s ease;
    box-shadow: 0 10px 30px rgba(255, 70, 100, 0.15);
}

.error-alert.show{
    display: block;
}

@keyframes slideInDown{
    from{
        opacity: 0;
        transform: translateY(-20px);
    }
    to{
        opacity: 1;
        transform: translateY(0);
    }
}

.profile-section{
    display: none;
    animation: fadeIn 0.6s ease;
}

.profile-section.show{
    display: block;
}

@keyframes fadeIn{
    from{
        opacity: 0;
        transform: translateY(20px);
    }
    to{
        opacity: 1;
        transform: translateY(0);
    }
}

.profile-header-container{
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 48px;
    align-items: center;
    margin-bottom: 48px;
    padding-bottom: 40px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.profile-avatar{
    width: 180px;
    height: 180px;
    border-radius: 24px;
    object-fit: cover;
    border: 2px solid rgba(102, 126, 234, 0.4);
    box-shadow: 0 30px 60px rgba(102, 126, 234, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
    transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
}

.profile-avatar:hover{
    transform: scale(1.08) rotateZ(2deg);
    box-shadow: 0 40px 80px rgba(102, 126, 234, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
    border-color: rgba(102, 126, 234, 0.6);
}

.profile-info h2{
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: 12px;
    letter-spacing: -1px;
    color: var(--light-text);
}

.profile-info p{
    margin: 12px 0;
    color: var(--muted-text);
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.6;
    letter-spacing: 0.3px;
}

.profile-link{
    color: #a8d4ff;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
    display: inline-block;
}

.profile-link:hover{
    color: #d4e4ff;
    transform: translateX(4px);
}

.stats-container{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.stat-box{
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(102, 126, 234, 0.15);
    border-radius: 18px;
    padding: 28px;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
    position: relative;
    overflow: hidden;
    cursor: default;
}

.stat-box::before{
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
    opacity: 0;
    transition: all 0.4s ease;
}

.stat-box:hover{
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(102, 126, 234, 0.4);
    transform: translateY(-8px);
    box-shadow: 0 20px 50px rgba(102, 126, 234, 0.2);
}

.stat-box:hover::before{
    opacity: 1;
    top: 0;
    right: 0;
}

.stat-label{
    color: var(--muted-text);
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
}

.stat-value{
    font-size: 2.5rem;
    font-weight: 800;
    background: var(--primary-gradient);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
}

.chart-section{
    margin-bottom: 40px;
}

.section-header{
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 32px;
    color: var(--light-text);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 12px;
}

.section-divider{
    height: 2px;
    background: linear-gradient(90deg, 
        transparent, 
        rgba(102, 126, 234, 0.3), 
        transparent);
    margin: 48px 0;
}

.bars-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(85px, 1fr));
    gap: 18px;
    margin-bottom: 32px;
}

.bar-wrapper{
    text-align: center;
}

.bar-column{
    background: var(--primary-gradient);
    border-radius: 14px 14px 0 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    color: white;
    font-weight: 700;
    padding-bottom: 10px;
    min-height: 50px;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
    font-size: 13px;
    box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
    position: relative;
}

.bar-column:hover{
    background: linear-gradient(135deg, #7a8bec 0%, #8b5bc4 50%, #f5a4cb 100%);
    box-shadow: 0 20px 60px rgba(102, 126, 234, 0.35);
    transform: scaleY(1.05);
}

.bar-label{
    margin-top: 14px;
    font-size: 13px;
    color: var(--muted-text);
    font-weight: 500;
    word-break: break-word;
    letter-spacing: 0.2px;
}

.insight-list{
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.insight-card{
    background: rgba(255, 255, 255, 0.04);
    border-left: 4px solid #667eea;
    border-radius: 12px;
    padding: 20px 24px;
    font-size: 0.95rem;
    font-weight: 500;
    transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
    color: var(--muted-text);
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
}

.insight-card::before{
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 4px;
    background: var(--primary-gradient);
    transform: scaleY(0);
    transform-origin: top;
    transition: transform 0.3s ease;
}

.insight-card:hover{
    background: rgba(255, 255, 255, 0.08);
    border-left-color: #f093fb;
    transform: translateX(6px);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
}

.insight-card:hover::before{
    transform: scaleY(1);
}

.repo-list{
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.repo-card{
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(102, 126, 234, 0.15);
    border-radius: 16px;
    padding: 28px;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
    position: relative;
    overflow: hidden;
}

.repo-card::after{
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
}

.repo-card:hover{
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(102, 126, 234, 0.4);
    transform: translateY(-6px);
    box-shadow: 0 25px 60px rgba(102, 126, 234, 0.2);
}

.repo-card:hover::after{
    opacity: 1;
}

.repo-title{
    color: #a8d4ff;
    text-decoration: none;
    font-size: 1.15rem;
    font-weight: 700;
    transition: all 0.3s ease;
    display: inline-block;
    letter-spacing: 0.3px;
    position: relative;
    z-index: 1;
}

.repo-title:hover{
    color: #d4e4ff;
    transform: translateX(4px);
}

.repo-desc{
    color: var(--muted-text);
    margin-top: 10px;
    font-size: 0.95rem;
    line-height: 1.6;
    letter-spacing: 0.2px;
}

.repo-meta{
    display: flex;
    gap: 24px;
    margin-top: 16px;
    color: var(--muted-text);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.3px;
}

.meta-item{
    transition: all 0.3s ease;
    cursor: default;
}

.meta-item:hover{
    color: #a8d4ff;
    transform: translateY(-2px);
}

@media(max-width: 768px){
    body{
        padding: 40px 16px;
    }

    .header-section h1{
        font-size: 2.8rem;
    }

    .profile-header-container{
        grid-template-columns: 1fr;
        gap: 24px;
        text-align: center;
    }

    .profile-avatar{
        margin: 0 auto;
    }

    .premium-card{
        padding: 28px;
        margin-bottom: 28px;
    }

    .stats-container{
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width: 480px){
    .header-section h1{
        font-size: 2rem;
    }

    .search-wrapper{
        flex-direction: column;
    }

    .search-input-group,
    .btn-analyze{
        width: 100%;
    }

    .stats-container{
        grid-template-columns: 1fr;
    }

    .bars-grid{
        grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="premium-card">
        <div class="header-section">
            <h1>🚀 Developer Insights</h1>
            <p>Discover & Analyze GitHub & LeetCode Profiles</p>
            <div class="header-badge">✨ Analytics Dashboard</div>
        </div>
    </div>

    <div class="premium-card">
        <div class="search-wrapper">
            <div class="search-input-group">
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Enter GitHub or LeetCode username..."
                />
            </div>
            <div class="search-input-group" style="flex: 0 0 180px;">
                <select id="platform">
                    <option value="github">🐙 GitHub</option>
                    <option value="leetcode">💻 LeetCode</option>
                </select>
            </div>
            <button class="btn-analyze" onclick="analyzeProfile()">Analyze Profile</button>
        </div>
    </div>

    <div class="loading-container" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Fetching your data...</div>
    </div>

    <div class="error-alert" id="error"></div>

    <div class="profile-section premium-card" id="profileSection">
        <div class="profile-header-container">
            <img id="avatar" class="profile-avatar"/>
            <div class="profile-info">
                <h2 id="name"></h2>
                <p id="bio"></p>
                <p>📍 <span id="location"></span></p>
                <p id="company"></p>
                <p>🔗 <a id="profileUrl" class="profile-link" target="_blank">Visit Profile</a></p>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">Repositories</div>
                <div class="stat-value" id="publicRepos">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Followers</div>
                <div class="stat-value" id="followers">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Following</div>
                <div class="stat-value" id="following">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Total Stars</div>
                <div class="stat-value" id="totalStars">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Top Language</div>
                <div class="stat-value" id="topLanguage">-</div>
            </div>
        </div>
    </div>

    <div class="premium-card chart-section" id="chartsSection" style="display:none;">
        <div class="section-header">📊 Language Distribution</div>
        <div class="bars-grid" id="languageChart"></div>

        <div class="section-divider"></div>

        <div class="section-header">⭐ Top Repositories by Stars</div>
        <div class="bars-grid" id="reposChart"></div>
    </div>

    <div class="premium-card" id="insightsSection" style="display:none;">
        <div class="section-header">💡 Key Insights</div>
        <div class="insight-list" id="insights"></div>
    </div>

    <div class="premium-card" id="reposSection" style="display:none;">
        <div class="section-header">📦 Recent Repositories</div>
        <div class="repo-list" id="reposList"></div>
    </div>

</div>

<script>

function analyzeProfile(){
    const platform = document.getElementById('platform').value;
    if(platform === 'github'){
        fetchGitHubData();
    }else{
        fetchLeetCodeData();
    }
}

async function fetchGitHubData(){
    const username = document.getElementById('username').value.trim();
    if(!username){
        showError('Please enter a GitHub username');
        return;
    }

    showLoading(true);
    hideError();

    try{
        const userResponse = await fetch(`https://api.github.com/users/${username}`);
        if(!userResponse.ok){
            showError('GitHub user not found. Please check the username.');
            return;
        }

        const userData = await userResponse.json();
        const reposResponse = await fetch(`https://api.github.com/users/${username}/repos?per_page=100`);
        const repos = await reposResponse.json();

        displayGitHubProfile(userData, repos);
    }catch(error){
        console.error(error);
        showError('Failed to fetch GitHub data. Please try again.');
    }finally{
        showLoading(false);
    }
}

function displayGitHubProfile(userData, repos){
    showSections(true, true, true);

    document.getElementById('avatar').src = userData.avatar_url;
    document.getElementById('name').textContent = userData.name || userData.login;
    document.getElementById('bio').textContent = userData.bio || 'No bio available';
    document.getElementById('location').textContent = userData.location || 'Not specified';
    document.getElementById('company').textContent = userData.company || '';
    document.getElementById('profileUrl').href = userData.html_url;

    document.getElementById('publicRepos').textContent = userData.public_repos;
    document.getElementById('followers').textContent = userData.followers;
    document.getElementById('following').textContent = userData.following;

    let totalStars = 0;
    const languages = {};

    repos.forEach(repo=>{
        totalStars += repo.stargazers_count;
        if(repo.language){
            languages[repo.language] = (languages[repo.language] || 0) + 1;
        }
    });

    document.getElementById('totalStars').textContent = totalStars;

    const topLanguage = Object.keys(languages).length
        ? Object.keys(languages).reduce((a,b)=> languages[a]>languages[b] ? a : b)
        : '-';

    document.getElementById('topLanguage').textContent = topLanguage;

    renderLanguageChart(languages);
    renderReposChart(repos);
    displayRepos(repos);

    document.getElementById('insights').innerHTML = `
        <div class="insight-card">📦 <strong>${repos.length}</strong> repositories detected</div>
        <div class="insight-card">⭐ <strong>${totalStars}</strong> total stars earned</div>
        <div class="insight-card">🚀 <strong>Impressive</strong> GitHub developer activity</div>
        <div class="insight-card">💬 <strong>${userData.followers}</strong> followers trust this developer</div>
    `;
}

async function fetchLeetCodeData(){
    const username = document.getElementById('username').value.trim();
    if(!username){
        showError('Please enter a LeetCode username');
        return;
    }

    showLoading(true);
    hideError();

    try{
        const response = await fetch(`https://leetcode-api-faisalshohag.vercel.app/${username}`);
        if(!response.ok){
            showError('LeetCode user not found. Please check the username.');
            return;
        }

        const data = await response.json();
        displayLeetCodeProfile(data, username);
    }catch(error){
        console.error(error);
        showError('Failed to fetch LeetCode data. Please try again.');
    }finally{
        showLoading(false);
    }
}

function displayLeetCodeProfile(data, username){
    showSections(false, true, false);

    document.getElementById('avatar').src = 'https://leetcode.com/static/images/LeetCode_logo_rvs.png';
    document.getElementById('name').textContent = username;
    document.getElementById('bio').textContent = 'Competitive Programmer';
    document.getElementById('location').textContent = 'LeetCode Community';
    document.getElementById('company').textContent = '';
    document.getElementById('profileUrl').href = `https://leetcode.com/${username}`;

    document.getElementById('publicRepos').textContent = data.totalSolved || 0;
    document.getElementById('followers').textContent = data.easySolved || 0;
    document.getElementById('following').textContent = data.mediumSolved || 0;
    document.getElementById('totalStars').textContent = data.hardSolved || 0;
    document.getElementById('topLanguage').textContent = data.ranking || 'N/A';

    document.getElementById('insights').innerHTML = `
        <div class="insight-card">🧠 <strong>${data.totalSolved || 0}</strong> problems solved</div>
        <div class="insight-card">🟢 <strong>${data.easySolved || 0}</strong> easy problems completed</div>
        <div class="insight-card">🟡 <strong>${data.mediumSolved || 0}</strong> medium problems completed</div>
        <div class="insight-card">🔴 <strong>${data.hardSolved || 0}</strong> hard problems completed</div>
        <div class="insight-card">🏆 <strong>Rank: ${data.ranking || 'N/A'}</strong> in the community</div>
    `;
}

function renderLanguageChart(languages){
    const chart = document.getElementById('languageChart');
    chart.innerHTML = '';

    const entries = Object.entries(languages).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const max = entries.length ? entries[0][1] : 1;

    entries.forEach(([lang, count], index)=>{
        const height = (count/max)*220;
        chart.innerHTML += `
            <div class="bar-wrapper" style="animation: fadeIn 0.5s ease ${index*0.05}s both;">
                <div class="bar-column" style="height:${height}px;">${count}</div>
                <div class="bar-label">${lang}</div>
            </div>
        `;
    });
}

function renderReposChart(repos){
    const chart = document.getElementById('reposChart');
    chart.innerHTML = '';

    const sorted = [...repos].sort((a,b)=>b.stargazers_count-a.stargazers_count).slice(0,5);
    const max = sorted.length ? sorted[0].stargazers_count : 1;

    sorted.forEach((repo, index)=>{
        const height = (repo.stargazers_count/max)*220;
        chart.innerHTML += `
            <div class="bar-wrapper" style="animation: fadeIn 0.5s ease ${index*0.05}s both;">
                <div class="bar-column" style="height:${height}px;">${repo.stargazers_count}</div>
                <div class="bar-label">${repo.name.substring(0,12)}</div>
            </div>
        `;
    });
}

function displayRepos(repos){
    const list = document.getElementById('reposList');
    list.innerHTML = '';

    [...repos].slice(0,10).forEach((repo, index)=>{
        list.innerHTML += `
            <div class="repo-card" style="animation: fadeIn 0.5s ease ${index*0.05}s both;">
                <a href="${repo.html_url}" target="_blank" class="repo-title">${repo.name}</a>
                <p class="repo-desc">${repo.description || 'No description available'}</p>
                <div class="repo-meta">
                    <div class="meta-item">⭐ ${repo.stargazers_count} stars</div>
                    <div class="meta-item">🍴 ${repo.forks_count} forks</div>
                    ${repo.language ? `<div class="meta-item">📝 ${repo.language}</div>` : ''}
                </div>
            </div>
        `;
    });
}

function showSections(showCharts, showInsights, showRepos){
    document.getElementById('profileSection').classList.add('show');
    document.getElementById('chartsSection').style.display = showCharts ? 'block' : 'none';
    document.getElementById('insightsSection').style.display = showInsights ? 'block' : 'none';
    document.getElementById('reposSection').style.display = showRepos ? 'block' : 'none';
}

function showLoading(show){
    const loader = document.getElementById('loading');
    if(show){
        loader.classList.add('show');
    }else{
        loader.classList.remove('show');
    }
}

function showError(message){
    const error = document.getElementById('error');
    error.textContent = message;
    error.classList.add('show');
}

function hideError(){
    document.getElementById('error').classList.remove('show');
}

</script>

</body>
</html>
