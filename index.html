<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Developer Insights Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --c-bg:       #060914;
  --c-bg2:      #0c1124;
  --c-glass:    rgba(255,255,255,0.04);
  --c-border:   rgba(255,255,255,0.07);
  --c-neon:     #00e5ff;
  --c-neon2:    #bf5fff;
  --c-neon3:    #ff4d8d;
  --c-neon4:    #39ff9e;
  --c-text:     #e4eeff;
  --c-muted:    #637599;
  --grd-main:   linear-gradient(135deg, #00e5ff 0%, #bf5fff 60%, #ff4d8d 100%);
  --grd-green:  linear-gradient(135deg, #39ff9e 0%, #00e5ff 100%);
  --ff-display: 'Syne', sans-serif;
  --ff-mono:    'JetBrains Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--ff-display);
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  padding: 60px 20px 100px;
  position: relative;
  overflow-x: hidden;
  cursor: default;
}

/* ── ANIMATED GRID BACKGROUND ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
  animation: gridDrift 40s linear infinite;
}

@keyframes gridDrift {
  0%   { background-position: 0 0; }
  100% { background-position: 48px 48px; }
}

/* ── CANVAS PARTICLES ── */
#particles { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* ── RADIAL GLOW ── */
.glow-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 20s ease-in-out infinite;
}
.glow-orb.a { width:600px; height:600px; top:-200px; left:-100px; background:rgba(0,229,255,0.07); }
.glow-orb.b { width:500px; height:500px; bottom:-100px; right:-50px; background:rgba(191,95,255,0.08); animation-delay:-10s; }
.glow-orb.c { width:400px; height:400px; top:40%; left:50%; background:rgba(255,77,141,0.05); animation-delay:-5s; }

@keyframes orbFloat {
  0%,100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-40px) scale(1.08); }
}

.container { max-width: 1380px; margin: auto; position: relative; z-index: 1; }

/* ── GLASS CARD ── */
.card {
  background: var(--c-glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--c-border);
  border-radius: 20px;
  padding: 40px;
  margin-bottom: 28px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
  transition: border-color .4s, box-shadow .4s, transform .4s cubic-bezier(.23,1,.32,1);
  position: relative;
  overflow: hidden;
}
.card:hover {
  border-color: rgba(0,229,255,0.18);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,229,255,0.06), inset 0 1px 0 rgba(255,255,255,0.1);
  transform: translateY(-3px);
}
.card-shine {
  position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);
  transition: left .6s ease; pointer-events:none;
}
.card:hover .card-shine { left:140%; }

/* ── HEADER ── */
.header-section { text-align:center; padding: 8px 0; }

.logo-ring {
  width: 72px; height: 72px;
  margin: 0 auto 20px;
  position: relative;
  animation: logoSpin 12s linear infinite;
}
.logo-ring svg { width:100%; height:100%; }

@keyframes logoSpin { to { transform: rotate(360deg); } }

.header-section h1 {
  font-size: clamp(2.4rem, 5vw, 4.2rem);
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 1.05;
  margin-bottom: 14px;
  background: var(--grd-main);
  background-size: 200% 200%;
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shiftGrad 6s ease infinite;
}

@keyframes shiftGrad {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}

.header-tagline {
  color: var(--c-muted);
  font-family: var(--ff-mono);
  font-size: 0.9rem;
  letter-spacing: 0.5px;
  margin-bottom: 20px;
}
.header-tagline span { color: var(--c-neon); }

.badge-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(0,229,255,0.08);
  border: 1px solid rgba(0,229,255,0.2);
  color: var(--c-neon);
  padding: 6px 16px;
  border-radius: 50px;
  font-family: var(--ff-mono);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: background .3s, transform .3s;
}
.badge:hover { background: rgba(0,229,255,0.14); transform: translateY(-2px); }
.badge.purple { color: var(--c-neon2); border-color: rgba(191,95,255,0.3); background: rgba(191,95,255,0.08); }
.badge.pink   { color: var(--c-neon3); border-color: rgba(255,77,141,0.3);  background: rgba(255,77,141,0.08);  }
.badge-dot { width:6px; height:6px; border-radius:50%; background:currentColor; animation: blink 1.5s ease infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

/* ── SEARCH ── */
.search-wrapper { display:flex; gap:14px; flex-wrap:wrap; align-items:stretch; }
.search-input-group { flex:1; min-width:200px; position:relative; }

.input-icon {
  position:absolute; left:18px; top:50%; transform:translateY(-50%);
  font-size:1.1rem; pointer-events:none; z-index:2;
  transition: filter .3s;
}

.search-input-group input,
.search-input-group select {
  width:100%;
  background: rgba(6,9,20,0.8);
  border: 1px solid rgba(0,229,255,0.15);
  color: var(--c-text);
  padding: 16px 20px 16px 50px;
  border-radius: 14px;
  font-size: 15px;
  font-family: var(--ff-mono);
  font-weight: 400;
  transition: all .3s cubic-bezier(.23,1,.32,1);
  letter-spacing: 0.3px;
  height: 58px;
}
.search-input-group select { padding-left: 50px; appearance:none; cursor:pointer; }
.search-input-group input::placeholder { color: rgba(99,117,153,0.7); }
.search-input-group input:focus,
.search-input-group select:focus {
  outline:none;
  border-color: var(--c-neon);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.1), 0 0 30px rgba(0,229,255,0.12);
  background: rgba(0,229,255,0.03);
}
.search-input-group:focus-within .input-icon { filter: drop-shadow(0 0 6px var(--c-neon)); }

.select-arrow {
  position:absolute; right:18px; top:50%; transform:translateY(-50%);
  pointer-events:none; color:var(--c-muted); font-size:.8rem;
}

.btn-analyze {
  padding: 0 42px;
  height: 58px;
  border: none; border-radius: 14px;
  background: var(--grd-main);
  color: #fff;
  font-weight: 700;
  font-family: var(--ff-display);
  cursor: pointer;
  font-size: 15px;
  letter-spacing: 0.5px;
  white-space: nowrap;
  box-shadow: 0 10px 40px rgba(0,229,255,0.25);
  position: relative; overflow: hidden;
  transition: all .3s cubic-bezier(.23,1,.32,1);
}
.btn-analyze::before {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  opacity:0; transition: opacity .3s;
}
.btn-analyze:hover { transform:translateY(-3px); box-shadow: 0 20px 50px rgba(0,229,255,0.35); }
.btn-analyze:hover::before { opacity:1; }
.btn-analyze:active { transform:translateY(0); }

.btn-inner { display:flex; align-items:center; gap:10px; }
.btn-icon { font-size:1.1rem; transition: transform .3s; }
.btn-analyze:hover .btn-icon { transform: translateX(4px); }

/* ── LOADING ── */
.loading-container {
  display:none; text-align:center; padding: 40px 0;
  animation: fadeIn .4s ease;
}
.loading-container.show { display:block; }

.loading-orbital {
  width: 70px; height: 70px;
  margin: 0 auto 20px;
  position: relative;
}
.loading-orbital::before,
.loading-orbital::after {
  content:''; position:absolute; border-radius:50%;
}
.loading-orbital::before {
  inset:0;
  border: 2px solid transparent;
  border-top-color: var(--c-neon);
  border-right-color: var(--c-neon2);
  animation: spin 1s linear infinite;
}
.loading-orbital::after {
  inset: 10px;
  border: 2px solid transparent;
  border-bottom-color: var(--c-neon3);
  animation: spin 1.5s linear infinite reverse;
}
.loading-dot {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:10px; height:10px; border-radius:50%;
  background: var(--c-neon);
  box-shadow: 0 0 12px var(--c-neon);
  animation: pulse 1s ease infinite;
}

@keyframes spin { to{transform:rotate(360deg);} }
@keyframes pulse { 0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1);} 50%{opacity:.4;transform:translate(-50%,-50%) scale(.6);} }

.loading-steps {
  display:flex; flex-direction:column; gap:8px; align-items:center;
  font-family: var(--ff-mono); font-size:0.82rem; color:var(--c-muted);
}
.loading-step { display:flex; align-items:center; gap:8px; }
.loading-step.active { color: var(--c-neon); }
.step-dot { width:4px; height:4px; border-radius:50%; background:currentColor; }

/* ── ERROR ── */
.error-alert {
  display:none;
  background: linear-gradient(135deg, rgba(255,77,141,0.12), rgba(255,100,80,0.08));
  border: 1px solid rgba(255,77,141,0.3);
  border-radius: 14px;
  padding: 18px 24px;
  margin-bottom: 28px;
  color: #ff9ec3;
  font-family: var(--ff-mono);
  font-size: .9rem;
  animation: slideDown .4s ease;
}
.error-alert.show { display:flex; align-items:center; gap:10px; }
@keyframes slideDown { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }

/* ── PROFILE SECTION ── */
.profile-section { display:none; }
.profile-section.show { display:block; animation: fadeUp .6s ease; }

@keyframes fadeUp { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }
@keyframes fadeIn  { from{opacity:0;} to{opacity:1;} }

.profile-header-container {
  display:grid; grid-template-columns: 160px 1fr; gap:40px;
  align-items:center; margin-bottom:40px; padding-bottom:36px;
  border-bottom: 1px solid var(--c-border);
}

.avatar-wrap { position:relative; display:inline-block; }
.profile-avatar {
  width:160px; height:160px; border-radius:20px; object-fit:cover;
  border: 2px solid rgba(0,229,255,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  transition: all .4s cubic-bezier(.23,1,.32,1);
  display:block;
}
.profile-avatar:hover { transform:scale(1.05); border-color: var(--c-neon); box-shadow: 0 0 40px rgba(0,229,255,0.3); }

.avatar-ring {
  position:absolute; inset:-6px; border-radius:24px;
  border: 1.5px solid transparent;
  background: var(--grd-main) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  opacity:0; transition: opacity .4s;
}
.avatar-wrap:hover .avatar-ring { opacity:1; }

.profile-info h2 {
  font-size: 2.5rem; font-weight: 800; letter-spacing: -1.5px;
  margin-bottom:8px; color: var(--c-text);
}

.profile-meta { display:flex; flex-wrap:wrap; gap:12px; margin:14px 0; }
.meta-chip {
  display:inline-flex; align-items:center; gap:6px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--c-border);
  padding: 5px 14px; border-radius:50px;
  font-family: var(--ff-mono); font-size:.82rem; color:var(--c-muted);
  transition: all .3s;
}
.meta-chip:hover { color:var(--c-text); border-color:rgba(0,229,255,0.2); background:rgba(0,229,255,0.05); }

.profile-link {
  display:inline-flex; align-items:center; gap:8px;
  color:var(--c-neon); text-decoration:none;
  font-family: var(--ff-mono); font-size:.85rem; font-weight:500;
  transition: all .3s; letter-spacing:.3px;
  border-bottom: 1px solid rgba(0,229,255,0.2); padding-bottom:1px;
}
.profile-link:hover { gap:12px; border-color:var(--c-neon); }

/* ── STATS ── */
.stats-container { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:16px; margin-bottom:36px; }

.stat-box {
  background: rgba(6,9,20,0.6);
  border: 1px solid var(--c-border);
  border-radius:16px; padding:24px 20px; text-align:center;
  position:relative; overflow:hidden;
  transition: all .4s cubic-bezier(.23,1,.32,1); cursor:default;
}
.stat-box::before {
  content:''; position:absolute; inset:0;
  background: var(--grd-main);
  opacity:0; transition: opacity .4s;
}
.stat-box:hover { border-color:rgba(0,229,255,0.3); transform:translateY(-6px); box-shadow:0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(0,229,255,0.08); }
.stat-box:hover::before { opacity:.04; }

.stat-icon { font-size:1.4rem; margin-bottom:10px; display:block; position:relative; z-index:1; }
.stat-label {
  color:var(--c-muted); font-family:var(--ff-mono); font-size:.72rem;
  text-transform:uppercase; letter-spacing:1.2px; margin-bottom:12px;
  position:relative; z-index:1;
}
.stat-value {
  font-size: 2.1rem; font-weight:800; letter-spacing:-1px;
  background: var(--grd-main);
  background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  position:relative; z-index:1;
}

/* ── SECTION HEADER ── */
.section-header {
  display:flex; align-items:center; gap:14px;
  font-size:1.2rem; font-weight:700; letter-spacing:-.3px;
  margin-bottom:28px; padding-bottom:16px;
  border-bottom: 1px solid var(--c-border);
}
.section-header-icon {
  width:36px; height:36px; border-radius:10px;
  background: rgba(0,229,255,0.1); border:1px solid rgba(0,229,255,0.2);
  display:flex; align-items:center; justify-content:center; font-size:1rem;
  flex-shrink:0;
}
.section-divider { height:1px; background: linear-gradient(90deg,transparent,rgba(0,229,255,0.2),transparent); margin:40px 0; }

/* ── BAR CHART ── */
.bars-grid { display:flex; align-items:flex-end; gap:16px; height:260px; padding-bottom:8px; }

.bar-wrapper {
  flex:1; min-width:60px; max-width:100px;
  display:flex; flex-direction:column; align-items:center;
  height:100%; justify-content:flex-end;
  position:relative;
}

.bar-track {
  width:100%; border-radius:10px 10px 0 0;
  background: rgba(255,255,255,0.04);
  position:absolute; bottom:28px; top:0;
}

.bar-fill {
  width:100%; border-radius:10px 10px 0 0;
  background: var(--grd-main);
  position:absolute; bottom:28px;
  height:0; transition: height .8s cubic-bezier(.23,1,.32,1);
  box-shadow: 0 -4px 20px rgba(0,229,255,0.2);
  cursor:pointer;
}
.bar-fill::after {
  content: attr(data-tooltip);
  position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
  background: rgba(6,9,20,0.95); border:1px solid rgba(0,229,255,0.25);
  color:var(--c-neon); font-family:var(--ff-mono); font-size:.75rem;
  padding:5px 10px; border-radius:8px; white-space:nowrap;
  opacity:0; pointer-events:none; transition: opacity .2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.bar-fill:hover::after { opacity:1; }
.bar-fill:hover { background: linear-gradient(135deg, #39ff9e, #00e5ff); box-shadow: 0 -8px 30px rgba(0,229,255,0.4); }

.bar-value { font-family:var(--ff-mono); font-size:.78rem; color:var(--c-muted); margin-bottom:4px; position:relative; z-index:2; }
.bar-label { font-family:var(--ff-mono); font-size:.72rem; color:var(--c-muted); text-align:center; word-break:break-word; position:absolute; bottom:0; }

/* ── INSIGHTS ── */
.insight-list { display:flex; flex-direction:column; gap:12px; }
.insight-card {
  background: rgba(6,9,20,0.5);
  border: 1px solid var(--c-border);
  border-left: 3px solid var(--c-neon);
  border-radius:12px; padding:16px 20px;
  font-size:.92rem; font-family:var(--ff-mono);
  color:var(--c-muted); letter-spacing:.2px;
  transition: all .3s cubic-bezier(.23,1,.32,1);
  display:flex; align-items:center; gap:12px;
}
.insight-card strong { color:var(--c-text); }
.insight-card:hover { background:rgba(0,229,255,0.04); border-left-color:var(--c-neon2); transform:translateX(6px); color:var(--c-text); }
.insight-emoji { font-size:1.1rem; flex-shrink:0; }

/* ── REPOS ── */
.repo-list { display:flex; flex-direction:column; gap:16px; }
.repo-card {
  background: rgba(6,9,20,0.6);
  border: 1px solid var(--c-border);
  border-radius:16px; padding:24px 28px;
  transition: all .4s cubic-bezier(.23,1,.32,1);
  position:relative; overflow:hidden;
}
.repo-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: var(--grd-main); opacity:0; transition: opacity .3s;
}
.repo-card:hover { border-color:rgba(0,229,255,0.2); transform:translateY(-4px); box-shadow:0 20px 50px rgba(0,0,0,0.5); }
.repo-card:hover::before { opacity:1; }

.repo-top { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:10px; flex-wrap:wrap; }
.repo-title {
  color: var(--c-neon); text-decoration:none;
  font-size:1rem; font-weight:700; letter-spacing:-.3px;
  transition: color .3s; font-family:var(--ff-mono);
}
.repo-title:hover { color:#fff; }

.repo-badges { display:flex; gap:8px; flex-shrink:0; flex-wrap:wrap; }
.repo-badge {
  font-family:var(--ff-mono); font-size:.73rem; padding:3px 10px; border-radius:20px;
  display:inline-flex; align-items:center; gap:4px;
}
.badge-stars { background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.2); color:#ffd700; }
.badge-forks { background:rgba(0,229,255,0.08); border:1px solid rgba(0,229,255,0.15); color:var(--c-neon); }
.badge-lang  { background:rgba(191,95,255,0.08); border:1px solid rgba(191,95,255,0.15); color:var(--c-neon2); }

.repo-desc { color:var(--c-muted); font-size:.88rem; line-height:1.6; letter-spacing:.2px; }

/* ── LANGUAGE PILLS ── */
.lang-color { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }

/* ── RESPONSIVE ── */
@media(max-width: 768px) {
  body { padding:32px 16px 80px; }
  .card { padding:28px 20px; }
  .profile-header-container { grid-template-columns:1fr; gap:24px; text-align:center; }
  .profile-avatar, .avatar-wrap { margin:0 auto; }
  .profile-meta { justify-content:center; }
  .stats-container { grid-template-columns:repeat(2,1fr); }
  .bars-grid { gap:10px; }
  .bar-wrapper { min-width:40px; }
}
@media(max-width: 480px) {
  .header-section h1 { font-size:2rem; }
  .search-wrapper { flex-direction:column; }
  .btn-analyze { width:100%; justify-content:center; }
  .stats-container { grid-template-columns:1fr 1fr; }
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--c-bg); }
::-webkit-scrollbar-thumb { background:rgba(0,229,255,0.2); border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:rgba(0,229,255,0.4); }

/* ── PLATFORM TOGGLE ── */
.platform-toggle {
  display:flex; border-radius:14px; overflow:hidden;
  background: rgba(6,9,20,0.8); border:1px solid var(--c-border);
  flex-shrink:0; height:58px;
}
.platform-btn {
  flex:1; border:none; background:transparent; color:var(--c-muted);
  cursor:pointer; padding:0 24px; font-family:var(--ff-mono); font-size:.82rem;
  font-weight:500; transition:all .3s; white-space:nowrap; display:flex; align-items:center; gap:8px;
}
.platform-btn.active { background: rgba(0,229,255,0.1); color:var(--c-neon); border-radius:12px; }
.platform-btn:hover:not(.active) { color:var(--c-text); }

/* ── CONTRIBUTION HEATMAP ── */
.heatmap-container { overflow-x:auto; padding-bottom:8px; }
.heatmap-grid {
  display:grid; grid-template-columns:repeat(52, 1fr); gap:3px;
  min-width:700px;
}
.heat-cell {
  width:13px; height:13px; border-radius:3px;
  background:rgba(255,255,255,0.05);
  transition: all .2s; cursor:default;
  position:relative;
}
.heat-cell:hover::after {
  content:attr(title); position:absolute; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%);
  background:rgba(6,9,20,.95); border:1px solid rgba(0,229,255,.2);
  color:var(--c-neon); font-family:var(--ff-mono); font-size:.7rem;
  padding:4px 8px; border-radius:6px; white-space:nowrap;
  z-index:10; pointer-events:none;
}
.heat-1 { background:rgba(0,229,255,0.15); }
.heat-2 { background:rgba(0,229,255,0.35); }
.heat-3 { background:rgba(0,229,255,0.6); }
.heat-4 { background:rgba(0,229,255,0.9); box-shadow:0 0 8px rgba(0,229,255,0.5); }

/* ── DONUT CHART ── */
.charts-row { display:grid; grid-template-columns:1fr 1fr; gap:28px; }
@media(max-width:700px) { .charts-row { grid-template-columns:1fr; } }

.chart-panel { }
.donut-wrap { display:flex; align-items:center; gap:28px; flex-wrap:wrap; }
.donut-svg { flex-shrink:0; }
.donut-legend { display:flex; flex-direction:column; gap:8px; flex:1; min-width:120px; }
.legend-item {
  display:flex; align-items:center; gap:10px;
  font-family:var(--ff-mono); font-size:.8rem; color:var(--c-muted);
  transition:color .2s; cursor:default;
}
.legend-item:hover { color:var(--c-text); }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.legend-pct { margin-left:auto; color:var(--c-text); font-weight:700; }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="glow-orb a"></div>
<div class="glow-orb b"></div>
<div class="glow-orb c"></div>

<div class="container">

  <!-- HEADER -->
  <div class="card">
    <div class="card-shine"></div>
    <div class="header-section">
      <div class="logo-ring">
        <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="34" stroke="url(#lg1)" stroke-width="1.5" stroke-dasharray="6 3"/>
          <circle cx="36" cy="36" r="22" stroke="url(#lg2)" stroke-width="1" opacity=".5"/>
          <text x="36" y="41" text-anchor="middle" font-size="20" fill="url(#lg1)">⚡</text>
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
              <stop stop-color="#00e5ff"/><stop offset=".5" stop-color="#bf5fff"/><stop offset="1" stop-color="#ff4d8d"/>
            </linearGradient>
            <linearGradient id="lg2" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
              <stop stop-color="#39ff9e"/><stop offset="1" stop-color="#00e5ff"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>Developer Insights</h1>
      <p class="header-tagline">// Analyze <span>GitHub</span> &amp; <span>LeetCode</span> profiles in real-time</p>
      <div class="badge-row">
        <span class="badge"><span class="badge-dot"></span>Live Data</span>
        <span class="badge purple"><span class="badge-dot"></span>AI-Powered Analytics</span>
        <span class="badge pink"><span class="badge-dot"></span>Open Source</span>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="card">
    <div class="card-shine"></div>
    <div class="search-wrapper">
      <div class="platform-toggle">
        <button class="platform-btn active" id="btnGitHub" onclick="setPlatform('github')">🐙 GitHub</button>
        <button class="platform-btn" id="btnLeetCode" onclick="setPlatform('leetcode')">💻 LeetCode</button>
      </div>
      <div class="search-input-group" style="flex:1">
        <span class="input-icon">👤</span>
        <input type="text" id="username" placeholder="Enter username..." onkeydown="if(event.key==='Enter')analyzeProfile()"/>
      </div>
      <button class="btn-analyze" onclick="analyzeProfile()">
        <span class="btn-inner"><span class="btn-icon">⚡</span> Analyze Profile</span>
      </button>
    </div>
  </div>

  <!-- LOADING -->
  <div class="loading-container" id="loading">
    <div class="loading-orbital"><div class="loading-dot"></div></div>
    <div class="loading-steps">
      <div class="loading-step active" id="step1"><span class="step-dot"></span> Fetching profile data...</div>
      <div class="loading-step" id="step2"><span class="step-dot"></span> Loading repositories...</div>
      <div class="loading-step" id="step3"><span class="step-dot"></span> Computing insights...</div>
    </div>
  </div>

  <!-- ERROR -->
  <div class="error-alert" id="error">
    <span>⚠️</span><span id="errorText"></span>
  </div>

  <!-- PROFILE -->
  <div class="profile-section card" id="profileSection">
    <div class="card-shine"></div>
    <div class="profile-header-container">
      <div class="avatar-wrap">
        <img id="avatar" class="profile-avatar"/>
        <div class="avatar-ring"></div>
      </div>
      <div class="profile-info">
        <h2 id="name"></h2>
        <div class="profile-meta" id="profileMeta"></div>
        <a id="profileUrl" class="profile-link" target="_blank">🔗 Visit Profile →</a>
      </div>
    </div>

    <div class="stats-container" id="statsContainer"></div>
  </div>

  <!-- CHARTS -->
  <div class="card" id="chartsSection" style="display:none;">
    <div class="card-shine"></div>
    <div id="chartContent"></div>
  </div>

  <!-- INSIGHTS -->
  <div class="card" id="insightsSection" style="display:none;">
    <div class="card-shine"></div>
    <div class="section-header">
      <div class="section-header-icon">💡</div>
      <span>Key Insights</span>
    </div>
    <div class="insight-list" id="insights"></div>
  </div>

  <!-- REPOS -->
  <div class="card" id="reposSection" style="display:none;">
    <div class="card-shine"></div>
    <div class="section-header">
      <div class="section-header-icon">📦</div>
      <span>Recent Repositories</span>
    </div>
    <div class="repo-list" id="reposList"></div>
  </div>

</div>

<script>
/* ── PARTICLES ── */
(function(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, dots = [];
  const N = 60;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for(let i=0; i<N; i++) dots.push({
    x: Math.random()*1e4, y: Math.random()*1e4,
    vx: (Math.random()-.5)*.4, vy: (Math.random()-.5)*.4,
    r: Math.random()*1.5+.5, a: Math.random()*.5+.1
  });

  (function frame() {
    requestAnimationFrame(frame);
    ctx.clearRect(0,0,W,H);
    dots.forEach(d => {
      d.x += d.vx; d.y += d.vy;
      if(d.x<0||d.x>W) d.vx*=-1;
      if(d.y<0||d.y>H) d.vy*=-1;
      ctx.beginPath();
      ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(0,229,255,${d.a})`;
      ctx.fill();
    });
    // draw lines
    for(let i=0;i<dots.length;i++) {
      for(let j=i+1;j<dots.length;j++) {
        const dx=dots[i].x-dots[j].x, dy=dots[i].y-dots[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120) {
          ctx.beginPath();
          ctx.moveTo(dots[i].x,dots[i].y);
          ctx.lineTo(dots[j].x,dots[j].y);
          ctx.strokeStyle=`rgba(0,229,255,${.06*(1-dist/120)})`;
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
    }
  })();
})();

/* ── PLATFORM TOGGLE ── */
let currentPlatform = 'github';
function setPlatform(p) {
  currentPlatform = p;
  document.getElementById('btnGitHub').classList.toggle('active', p==='github');
  document.getElementById('btnLeetCode').classList.toggle('active', p==='leetcode');
  document.getElementById('username').placeholder = p==='github' ? 'Enter GitHub username...' : 'Enter LeetCode username...';
}

/* ── ANIMATE COUNTER ── */
function animateCount(el, target, isNum=true) {
  if(!isNum || isNaN(target)) { el.textContent = target; return; }
  let start=0, dur=1200, t0=null;
  function step(ts) {
    if(!t0) t0=ts;
    const prog = Math.min((ts-t0)/dur, 1);
    const ease = 1-Math.pow(1-prog,3);
    el.textContent = Math.round(ease*target).toLocaleString();
    if(prog<1) requestAnimationFrame(step);
    else el.textContent = target.toLocaleString();
  }
  requestAnimationFrame(step);
}

/* ── MAIN ── */
function analyzeProfile() {
  if(currentPlatform==='github') fetchGitHubData();
  else fetchLeetCodeData();
}

/* ── LOADING STEPS ── */
let stepTimer;
function showLoading(show) {
  const el = document.getElementById('loading');
  el.classList.toggle('show', show);
  if(show) {
    ['step1','step2','step3'].forEach(s=>document.getElementById(s).classList.remove('active'));
    document.getElementById('step1').classList.add('active');
    let s=1;
    stepTimer = setInterval(()=>{
      if(s<3) { s++; document.getElementById('step'+s).classList.add('active'); }
    }, 600);
  } else {
    clearInterval(stepTimer);
  }
}

function showError(msg) {
  const el=document.getElementById('error');
  document.getElementById('errorText').textContent=msg;
  el.classList.add('show');
}
function hideError() { document.getElementById('error').classList.remove('show'); }

/* ── GITHUB ── */
async function fetchGitHubData() {
  const username = document.getElementById('username').value.trim();
  if(!username) { showError('Please enter a GitHub username.'); return; }
  showLoading(true); hideError();
  try {
    const [userRes, reposRes] = await Promise.all([
      fetch(`https://api.github.com/users/${username}`),
      fetch(`https://api.github.com/users/${username}/repos?per_page=100&sort=updated`)
    ]);
    if(!userRes.ok) { showError('GitHub user not found.'); return; }
    const userData = await userRes.json();
    const repos    = await reposRes.json();
    displayGitHubProfile(userData, repos);
  } catch(e) {
    console.error(e);
    showError('Failed to fetch GitHub data. Please try again.');
  } finally { showLoading(false); }
}

const LANG_COLORS = {
  JavaScript:'#f7df1e', TypeScript:'#3178c6', Python:'#3572A5', Java:'#b07219',
  'C++':'#f34b7d', 'C#':'#178600', Go:'#00ADD8', Rust:'#dea584', Ruby:'#701516',
  PHP:'#4F5D95', Swift:'#ffac45', Kotlin:'#A97BFF', HTML:'#e34c26', CSS:'#563d7c',
  Shell:'#89e051', Vue:'#41b883', Dart:'#00B4AB', Scala:'#c22d40',
};

function getLangColor(lang) {
  return LANG_COLORS[lang] || `hsl(${Math.abs(lang.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%360},70%,60%)`;
}

function displayGitHubProfile(u, repos) {
  // Profile
  document.getElementById('avatar').src = u.avatar_url;
  document.getElementById('name').textContent = u.name || u.login;
  document.getElementById('profileUrl').href = u.html_url;

  const meta = document.getElementById('profileMeta');
  meta.innerHTML = '';
  if(u.bio) meta.innerHTML += `<span class="meta-chip">💬 ${u.bio}</span>`;
  if(u.location) meta.innerHTML += `<span class="meta-chip">📍 ${u.location}</span>`;
  if(u.company) meta.innerHTML += `<span class="meta-chip">🏢 ${u.company}</span>`;

  // Stats
  let totalStars=0, languages={};
  repos.forEach(r => {
    totalStars += r.stargazers_count;
    if(r.language) languages[r.language] = (languages[r.language]||0)+1;
  });
  const topLang = Object.keys(languages).length
    ? Object.keys(languages).reduce((a,b)=>languages[a]>languages[b]?a:b) : '-';

  const statsData = [
    { icon:'📦', label:'Repositories', value:u.public_repos, id:'sv0' },
    { icon:'👥', label:'Followers',    value:u.followers,    id:'sv1' },
    { icon:'➡️', label:'Following',    value:u.following,    id:'sv2' },
    { icon:'⭐', label:'Total Stars',  value:totalStars,     id:'sv3' },
    { icon:'🖥️', label:'Top Language', value:topLang,        id:'sv4', str:true },
  ];
  const sc = document.getElementById('statsContainer');
  sc.innerHTML = statsData.map(s=>`
    <div class="stat-box">
      <span class="stat-icon">${s.icon}</span>
      <div class="stat-label">${s.label}</div>
      <div class="stat-value" id="${s.id}">0</div>
    </div>`).join('');
  setTimeout(()=>{
    statsData.forEach(s => animateCount(document.getElementById(s.id), s.str?s.value:s.value, !s.str));
  }, 100);

  // Charts
  const cc = document.getElementById('chartContent');
  cc.innerHTML = `
    <div class="charts-row">
      <div class="chart-panel">
        <div class="section-header"><div class="section-header-icon">📊</div><span>Language Distribution</span></div>
        <div class="donut-wrap" id="donutWrap"></div>
      </div>
      <div class="chart-panel">
        <div class="section-header"><div class="section-header-icon">⭐</div><span>Top Repos by Stars</span></div>
        <div class="bars-grid" id="reposChart"></div>
      </div>
    </div>`;

  renderDonut(languages);
  renderReposChart(repos);
  displayRepos(repos);

  // Insights
  document.getElementById('insights').innerHTML = [
    { icon:'📦', text:`<strong>${repos.length}</strong> repositories detected` },
    { icon:'⭐', text:`<strong>${totalStars.toLocaleString()}</strong> total stars earned` },
    { icon:'👥', text:`<strong>${u.followers.toLocaleString()}</strong> developers follow this profile` },
    { icon:'🚀', text:`Primary language: <strong>${topLang}</strong>` },
    { icon:'🔄', text:`Active across <strong>${Object.keys(languages).length}</strong> programming languages` },
  ].map(i=>`<div class="insight-card"><span class="insight-emoji">${i.icon}</span><span>${i.text}</span></div>`).join('');

  showSections(true, true, true);
}

function renderDonut(languages) {
  const entries = Object.entries(languages).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const total   = entries.reduce((s,[,v])=>s+v, 0);
  const colors  = entries.map(([l])=>getLangColor(l));
  const r=60, cx=80, cy=80, stroke=22;
  const circumference = 2*Math.PI*r;
  let offset = 0;

  const paths = entries.map(([l,v],i)=>{
    const pct   = v/total;
    const dash  = pct*circumference;
    const gap   = circumference-dash;
    const path  = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[i]}" stroke-width="${stroke}"
      stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset*circumference}"
      style="transition:stroke-dashoffset .8s cubic-bezier(.23,1,.32,1) ${i*.06}s"
      opacity=".9"/>`;
    offset += pct;
    return path;
  }).join('');

  const legend = entries.map(([l,v],i)=>{
    const pct = Math.round(v/total*100);
    return `<div class="legend-item">
      <span class="legend-dot" style="background:${colors[i]}"></span>
      <span>${l}</span>
      <span class="legend-pct">${pct}%</span>
    </div>`;
  }).join('');

  document.getElementById('donutWrap').innerHTML = `
    <svg class="donut-svg" width="160" height="160" viewBox="0 0 160 160" style="transform:rotate(-90deg)">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="${stroke}"/>
      ${paths}
    </svg>
    <div class="donut-legend">${legend}</div>`;
}

function renderReposChart(repos) {
  const chart = document.getElementById('reposChart');
  if(!chart) return;
  const sorted = [...repos].sort((a,b)=>b.stargazers_count-a.stargazers_count).slice(0,6);
  const max    = sorted.length ? sorted[0].stargazers_count||1 : 1;
  const maxH   = 200;

  chart.innerHTML = sorted.map((repo, i)=>{
    const h = Math.max((repo.stargazers_count/max)*maxH, 8);
    return `<div class="bar-wrapper">
      <div class="bar-track"></div>
      <div class="bar-fill" id="bf${i}" style="height:0" data-h="${h}" data-tooltip="${repo.name}: ⭐${repo.stargazers_count}"></div>
      <span class="bar-label">${repo.name.substring(0,10)}</span>
    </div>`;
  }).join('');

  setTimeout(()=>{
    sorted.forEach((_,i)=>{
      const el = document.getElementById('bf'+i);
      if(el) el.style.height = el.dataset.h+'px';
    });
  }, 100);
}

function displayRepos(repos) {
  const list = document.getElementById('reposList');
  list.innerHTML = [...repos].slice(0,10).map((repo, i)=>`
    <div class="repo-card" style="animation:fadeUp .5s ease ${i*.04}s both">
      <div class="repo-top">
        <a href="${repo.html_url}" target="_blank" class="repo-title">⌂ ${repo.name}</a>
        <div class="repo-badges">
          ${repo.stargazers_count>0 ? `<span class="repo-badge badge-stars">⭐ ${repo.stargazers_count}</span>`:''}
          ${repo.forks_count>0      ? `<span class="repo-badge badge-forks">🍴 ${repo.forks_count}</span>`:''}
          ${repo.language           ? `<span class="repo-badge badge-lang"><span class="lang-color" style="background:${getLangColor(repo.language)}"></span>${repo.language}</span>`:''}
        </div>
      </div>
      <p class="repo-desc">${repo.description || '— No description —'}</p>
    </div>`).join('');
}

/* ── LEETCODE ── */
async function fetchLeetCodeData() {
  const username = document.getElementById('username').value.trim();
  if(!username) { showError('Please enter a LeetCode username.'); return; }
  showLoading(true); hideError();
  try {
    const res  = await fetch(`https://leetcode-api-faisalshohag.vercel.app/${username}`);
    if(!res.ok) { showError('LeetCode user not found.'); return; }
    const data = await res.json();
    displayLeetCodeProfile(data, username);
  } catch(e) {
    console.error(e);
    showError('Failed to fetch LeetCode data. Please try again.');
  } finally { showLoading(false); }
}

function displayLeetCodeProfile(data, username) {
  document.getElementById('avatar').src = 'https://leetcode.com/static/images/LeetCode_logo_rvs.png';
  document.getElementById('name').textContent = username;
  document.getElementById('profileUrl').href = `https://leetcode.com/${username}`;

  const meta = document.getElementById('profileMeta');
  meta.innerHTML = `<span class="meta-chip">⚔️ Competitive Programmer</span><span class="meta-chip">🌐 LeetCode Community</span>`;

  // Stats
  const total=data.totalSolved||0, easy=data.easySolved||0, med=data.mediumSolved||0, hard=data.hardSolved||0;
  const statsData=[
    {icon:'🧠',label:'Total Solved', value:total,      id:'sv0'},
    {icon:'🟢',label:'Easy',         value:easy,       id:'sv1'},
    {icon:'🟡',label:'Medium',       value:med,        id:'sv2'},
    {icon:'🔴',label:'Hard',         value:hard,       id:'sv3'},
    {icon:'🏆',label:'Ranking',      value:data.ranking||'N/A', id:'sv4', str:true},
  ];
  const sc=document.getElementById('statsContainer');
  sc.innerHTML = statsData.map(s=>`<div class="stat-box"><span class="stat-icon">${s.icon}</span><div class="stat-label">${s.label}</div><div class="stat-value" id="${s.id}">0</div></div>`).join('');
  setTimeout(()=>{ statsData.forEach(s=>animateCount(document.getElementById(s.id),s.str?s.value:s.value,!s.str)); }, 100);

  // Difficulty bar chart
  const cc = document.getElementById('chartContent');
  cc.innerHTML = `
    <div class="section-header"><div class="section-header-icon">📊</div><span>Problem Difficulty Breakdown</span></div>
    <div class="bars-grid" id="diffChart" style="height:220px;"></div>`;

  const diffData=[['Easy',easy,'#39ff9e'],['Medium',med,'#ffd700'],['Hard',hard,'#ff4d8d'],['Total',total,'url(#grdMain)']];
  const maxV = Math.max(total,1);
  const dc   = document.getElementById('diffChart');
  dc.innerHTML = diffData.map(([l,v,c],i)=>`
    <div class="bar-wrapper">
      <div class="bar-track"></div>
      <div class="bar-fill" id="dc${i}" style="height:0;background:${c}" data-h="${(v/maxV)*190}" data-tooltip="${l}: ${v}"></div>
      <span class="bar-label">${l}</span>
    </div>`).join('');
  setTimeout(()=>{ diffData.forEach((_,i)=>{ const e=document.getElementById('dc'+i); if(e) e.style.height=e.dataset.h+'px'; }); }, 100);

  // Insights
  const rate = total>0 ? Math.round(hard/total*100) : 0;
  document.getElementById('insights').innerHTML = [
    {icon:'🧠',text:`<strong>${total}</strong> problems solved total`},
    {icon:'🟢',text:`Easy: <strong>${easy}</strong> problems`},
    {icon:'🟡',text:`Medium: <strong>${med}</strong> problems`},
    {icon:'🔴',text:`Hard: <strong>${hard}</strong> — that's <strong>${rate}%</strong> of all solved`},
    {icon:'🏆',text:`Community ranking: <strong>${data.ranking||'N/A'}</strong>`},
  ].map(i=>`<div class="insight-card"><span class="insight-emoji">${i.icon}</span><span>${i.text}</span></div>`).join('');

  showSections(false, true, false);
}

function showSections(charts, insights, repos) {
  document.getElementById('profileSection').classList.add('show');
  document.getElementById('chartsSection').style.display   = charts   ? 'block':'none';
  document.getElementById('insightsSection').style.display = insights ? 'block':'none';
  document.getElementById('reposSection').style.display    = repos    ? 'block':'none';

  // scroll into view
  setTimeout(()=>document.getElementById('profileSection').scrollIntoView({behavior:'smooth',block:'start'}), 100);
}
</script>
</body>
</html>
